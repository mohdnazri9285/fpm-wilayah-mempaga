<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPMSB Wilayah Mempaga - Pencapaian Hasil 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #f4f6f9; --card: #ffffff; --primary: #0f3b1f; --accent: #e6a800;
            --text: #1a1a1a; --text-light: #555; --shadow: 0 4px 12px rgba(0,0,0,0.06); --radius: 14px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }
        .container { max-width: 1300px; margin: auto; padding: 20px 16px; }
        .header { background: linear-gradient(135deg, #0b2e0b, #1a4f1a); color: white; padding: 16px 24px; border-radius: 16px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .nav-links { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .nav-links a { background: white; padding: 8px 18px; border-radius: 20px; text-decoration: none; font-weight: 600; color: var(--text); box-shadow: 0 2px 6px rgba(0,0,0,0.05); transition: 0.2s; }
        .nav-links a:hover { background: #eef3ee; }
        .nav-links a.active { background: var(--primary); color: white; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap:12px; margin-bottom:20px; }
        .stat-card { background: var(--card); border-radius: var(--radius); padding:16px; box-shadow: var(--shadow); border-left:4px solid var(--primary); }
        .stat-card.accent { border-left-color: var(--accent); }
        .stat-card .val { font-size:1.8rem; font-weight:800; }
        .stat-card .lbl { font-size:0.75rem; color:var(--text-light); margin-top:4px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap:18px; }
        .card { background: var(--card); border-radius: var(--radius); padding:18px; box-shadow: var(--shadow); margin-bottom:18px; }
        .card h3 { font-size:1rem; margin-bottom:12px; color:var(--primary); }
        .chart-box { height:280px; position:relative; }
        .chart-box canvas { width:100% !important; height:100% !important; }
        .tabs { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
        .tab { padding:8px 18px; border-radius:20px; background:white; border:1px solid #ddd; cursor:pointer; font-weight:600; font-size:0.85rem; }
        .tab.active { background:var(--primary); color:white; border-color:var(--primary); }
        table { width:100%; border-collapse:collapse; font-size:0.85rem; }
        th { background:#1a3c1a; color:white; padding:8px; text-align:left; }
        td { padding:8px; border-bottom:1px solid #eee; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; align-items:center; justify-content:center; }
        .modal.show { display:flex; }
        .modal-content { background:white; border-radius:16px; padding:24px; max-width:700px; width:90%; max-height:80vh; overflow-y:auto; }
        .close { float:right; font-size:1.5rem; cursor:pointer; }
        @media (max-width:700px) { .grid-2 { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌴 Pencapaian Hasil 2026</h1>
        <span style="background:rgba(255,255,255,0.2); padding:6px 14px; border-radius:20px; font-weight:600;">Data Sehingga 31 Mac 2026</span>
    </div>
    <div class="nav-links">
        <a href="page1.html">📊 Page 1: Dashboard</a>
        <a href="page2.html" class="active">📈 Page 2: Pencapaian Hasil</a>
    </div>

    <!-- Filter Bulan (simulasi) -->
    <div style="display:flex; gap:10px; align-items:center; margin-bottom:20px; flex-wrap:wrap;">
        <span style="font-weight:600;">📅 Filter Bulan:</span>
        <input type="month" id="startMonth" value="2026-01">
        <span>hingga</span>
        <input type="month" id="endMonth" value="2026-12">
        <button onclick="alert('Fungsi filter aktif selepas integrasi data sebenar')" style="padding:6px 16px; border-radius:20px; border:1px solid var(--primary); background:white; cursor:pointer;">Guna</button>
    </div>

    <div class="stats-row" id="hasilSummary"></div>

    <div class="tabs" id="hasilTabs">
        <button class="tab active" data-tab="ringkasan">Ringkasan</button>
        <button class="tab" data-tab="peneroka">Lot Peneroka</button>
        <button class="tab" data-tab="tambahan">Lot Tambahan</button>
        <button class="tab" data-tab="felda">Lot FELDA</button>
        <button class="tab" data-tab="zon">Mengikut Zon</button>
        <button class="tab" data-tab="bts">Kualiti BTS</button>
    </div>

    <div id="tabContent"></div>
</div>

<div class="modal" id="projekModal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">✖</span>
        <div id="modalBody"></div>
    </div>
</div>

<script>
const hasilData = {
    peneroka: { luas:17112.53, target:18.02, capaiKini:3.24, capai2025:2.58, varian:0.66, pc:96 },
    tambahan: { luas:418.63, target:15.79, capaiKini:2.93, capai2025:2.53, varian:0.40, pc:90 },
    felda: { luas:3322.51, target:16.27, capaiKini:2.32, capai2025:1.62, varian:0.70, pc:76 }
};
const zoneProjek = {
    koyan: ['Tersang 2','Tersang 1','Sg Koyan 3','Tersang 3','Chegar Perah','Sg Koyan 1'],
    mempaga: ['Kg. Sertik','Lakum','Lembah Klau','Lurah Bilut','Jenderak Selatan','Krau 1','Jenderak Utara','Mempaga 1','Bukit Damar'],
    mendi: ['Chemomoi','Kemasul','Mengkuang','Tembangau 1','Tembangau 2'],
    bera: ['Bkt Kepayang','Mayam','Kumai','Triang 3','Sebertak','Rentam','Tementi','Triang 1','Purun']
};

function renderSummary() {
    const s = hasilData;
    document.getElementById('hasilSummary').innerHTML = `
        <div class="stat-card"><div class="val">${s.peneroka.pc}%</div><div class="lbl">Lot Peneroka</div></div>
        <div class="stat-card accent"><div class="val">${s.tambahan.pc}%</div><div class="lbl">Lot Tambahan</div></div>
        <div class="stat-card"><div class="val">${s.felda.pc}%</div><div class="lbl">Lot FELDA</div></div>
        <div class="stat-card"><div class="val">93%</div><div class="lbl">Keseluruhan</div></div>
    `;
}

function renderTabContent(tab) {
    const container = document.getElementById('tabContent');
    switch(tab) {
        case 'ringkasan':
            container.innerHTML = `
                <div class="card"><h3>📊 Perbandingan Lot</h3><div class="chart-box"><canvas id="chartRingkasan"></canvas></div></div>
                <div class="card"><h3>📋 Jadual Ringkasan</h3>
                    <table>
                        <thead><tr><th>Lot</th><th>Luas (Ha)</th><th>Target</th><th>Capai (T/Ha)</th><th>%</th><th>2025</th><th>Varian</th></tr></thead>
                        <tbody>
                            <tr><td>Peneroka</td><td>17112.53</td><td>18.02</td><td>3.24</td><td>96</td><td>2.58</td><td>+0.66</td></tr>
                            <tr><td>Tambahan</td><td>418.63</td><td>15.79</td><td>2.93</td><td>90</td><td>2.53</td><td>+0.40</td></tr>
                            <tr><td>FELDA</td><td>3322.51</td><td>16.27</td><td>2.32</td><td>76</td><td>1.62</td><td>+0.70</td></tr>
                        </tbody>
                    </table>
                </div>`;
            new Chart(document.getElementById('chartRingkasan'), {
                type: 'bar',
                data: { labels: ['Peneroka','Tambahan','FELDA'], datasets: [
                    { label:'2026', data:[3.24,2.93,2.32], backgroundColor:'#1a5f2a' },
                    { label:'2025', data:[2.58,2.53,1.62], backgroundColor:'#b0bec5' }
                ] }
            });
            break;
        case 'peneroka':
            container.innerHTML = `<p>Detail Lot Peneroka akan dipaparkan di sini (graf & jadual ikut zon).</p>`;
            break;
        case 'tambahan':
            container.innerHTML = `<p>Detail Lot Tambahan akan dipaparkan di sini.</p>`;
            break;
        case 'felda':
            container.innerHTML = `<p>Detail Lot FELDA akan dipaparkan di sini.</p>`;
            break;
        case 'zon':
            container.innerHTML = `<div class="grid-2">${Object.keys(zoneProjek).map(z=>`
                <div class="card" style="cursor:pointer;" onclick="showZoneDetail('${z}')">
                    <h3>📍 ${z.toUpperCase()}</h3><p>${zoneProjek[z].length} projek</p>
                </div>`).join('')}</div>`;
            break;
        case 'bts':
            container.innerHTML = `<div class="card"><h3>🔬 Kualiti BTS</h3><div class="chart-box"><canvas id="chartBTS"></canvas></div></div>`;
            new Chart(document.getElementById('chartBTS'), {
                type: 'doughnut',
                data: { labels:['Masak','Mengkal','Muda'], datasets:[{ data:[90.06,8.22,1.18], backgroundColor:['#2d8a4e','#f0a500','#c62828'] }] }
            });
            break;
    }
}

function showZoneDetail(zone) {
    const projek = zoneProjek[zone];
    document.getElementById('modalBody').innerHTML = `<h3>${zone.toUpperCase()} - Senarai Projek</h3><ul>${projek.map(p=>`<li>${p}</li>`).join('')}</ul>`;
    document.getElementById('projekModal').classList.add('show');
}
function closeModal() { document.getElementById('projekModal').classList.remove('show'); }

// Init
renderSummary();
const tabs = document.querySelectorAll('#hasilTabs .tab');
tabs.forEach(tab => {
    tab.addEventListener('click', function() {
        tabs.forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        renderTabContent(this.dataset.tab);
    });
});
renderTabContent('ringkasan');
</script>
</body>
</html>
